<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeaMerry Forest</title>
  <link rel="stylesheet" href="forest.css">
</head>
<body>
  <main class="forest-scene" aria-label="TeaMerryの森を探索する入口">
    <div class="forest-stage viewport">
      <div class="map-content" aria-label="森の中にある入口">
        <video class="forest-bg" autoplay muted loop playsinline aria-hidden="true">
          <source src="./assets/images/forest.webm" type="video/webm">
        </video>

        <a class="forest-portal forest-portal--game" href="index.html" aria-label="雫ゲームへ">
          <img src="./assets/images/ui/Forest_Dew_Game_J.webp" alt="">
        </a>

        <a class="forest-portal forest-portal--fortune" href="https://ratemaru88.wixsite.com/teamerry/%E3%83%86%E3%82%B9%E3%83%88" aria-label="フォーチュンクッキー">
          <img src="./assets/images/ui/FortuneCookie.webp" alt="">
          <span class="portal-caption">キッズおみくじ</span>
        </a>

        <a class="forest-portal forest-portal--shrine" href="https://ratemaru88.wixsite.com/teamerry/%E3%83%97%E3%83%A9%E3%82%A4%E3%83%90%E3%82%B7%E3%83%BC%E3%83%9D%E3%83%AA%E3%82%B7%E3%83%BC" aria-label="森のおみくじ">
          <img src="./assets/images/ui/Omikuji_J.webp" alt="">
        </a>

        <a class="forest-portal forest-portal--onsen" href="https://www.youtube.com/shorts/iSJxSmvZMes" aria-label="お茶の参り温泉郷">
          <img src="./assets/images/ui/chachajii_onsenkyou_J.webp" alt="">
        </a>

        <a class="forest-portal forest-portal--character" href="https://ratemaru88.wixsite.com/teamerry/about-5-1" aria-label="キャラクター">
          <img src="./assets/images/ui/characte_J%20.webp" alt="">
        </a>

        <a class="forest-portal forest-portal--artwork" href="https://ratemaru88.wixsite.com/teamerry/about-1-2" aria-label="作品">
          <img src="./assets/images/ui/Artwork_Falls_J.webp" alt="">
        </a>

        <a class="forest-portal forest-portal--blog" href="https://ratemaru88.wixsite.com/teamerry/%E6%97%A7kakaoblend" aria-label="ブログ">
          <img src="./assets/images/ui/Memory_Cave_J2.webp" alt="">
        </a>

        <button class="forest-portal forest-portal--contact" type="button" data-coming-soon="お問い合わせ" aria-label="お問い合わせ">
          <img src="./assets/images/ui/toiawase.webp" alt="">
        </button>

        <img class="ambient-mist ambient-mist--falls" src="./assets/images/effects/ambient/mist.webp" alt="" aria-hidden="true">
        <img class="leaf-drift leaf-drift--one" src="./assets/images/effects/ambient/leaf-particle.webp" alt="" aria-hidden="true">
        <img class="leaf-drift leaf-drift--two" src="./assets/images/effects/ambient/leaf-particle.webp" alt="" aria-hidden="true">

        <button class="hidden-drop hidden-drop--one" type="button" aria-label="光る雫を調べる"></button>
        <button class="hidden-drop hidden-drop--two" type="button" aria-label="光る雫を調べる"></button>
        <button class="hidden-drop hidden-drop--three" type="button" aria-label="光る雫を調べる"></button>
      </div>

      <div class="forest-effect forest-effect--light" aria-hidden="true"></div>
      <div class="forest-effect forest-effect--mist" aria-hidden="true"></div>
      <div class="forest-vignette" aria-hidden="true"></div>
    </div>

    <div class="tap-effects" aria-hidden="true"></div>
    <div class="mint-guide" aria-hidden="true">
      <img class="mint-guide__image mint-guide__image--normal" src="./assets/images/effects/mint-guide.webp" alt="">
      <img class="mint-guide__image mint-guide__image--blink" src="./assets/images/effects/mint-guide-blink.webp" alt="">
    </div>

    <section class="forest-title" aria-label="TeaMerry Forest">
      <p>Tiny World in a Teacup</p>
      <h1>TeaMerry Forest</h1>
    </section>

    <p class="forest-toast" role="status" aria-live="polite"></p>
  </main>

  <script src="forest.js"></script>
</body>
</html>
